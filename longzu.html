<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ 执行部任务</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#0d0d0d;color:#c8c0b0;min-height:100vh}
        .container{max-width:500px;margin:0 auto;padding:12px}
        .topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:linear-gradient(135deg,#8b0000,#4a0000);border-radius:14px;margin-bottom:10px;border:1px solid #c9a96e}
        .topbar h1{font-size:20px;color:#c9a96e}
        .stat-row{display:flex;gap:8px;margin:8px 0}
        .stat-box{flex:1;padding:10px;border-radius:12px;text-align:center;font-weight:800;background:#1a1a1a;border:1px solid #333}
        .sa{border-color:#8b0000}.sa .n{color:#c9a96e;font-size:24px}
        .sd{border-color:#4a0000}.sd .n{color:#8b0000;font-size:24px}
        .sw{border-color:#c9a96e}.sw .n{color:#c9a96e;font-size:24px}
        .name-row{font-size:12px;line-height:1.6;background:#1a1a1a;border-radius:10px;padding:8px 12px;margin:4px 0;border:1px solid #333}
        .alive-c{color:#c9a96e;font-weight:700}.dead-c{color:#8b0000}.wait-c{color:#d4a574}
        .tabs{display:flex;gap:4px;margin:8px 0}
        .tab-btn{flex:1;text-align:center;padding:12px;font-size:14px;font-weight:800;cursor:pointer;border-radius:12px 12px 0 0;border:none}
        .tab-btn.active{background:#1a1a1a;color:#c9a96e;border:1px solid #c9a96e;border-bottom:none}
        .tab-btn.inactive{background:#111;color:#666}
        .page{background:#1a1a1a;border-radius:0 0 14px 14px;padding:12px;min-height:200px;border:1px solid #333;border-top:none}
        .btn{padding:12px 20px;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;margin:3px;width:100%}
        .btn-gold{background:linear-gradient(135deg,#c9a96e,#8b6914);color:#0d0d0d}
        .btn-red{background:linear-gradient(135deg,#8b0000,#4a0000);color:#c8c0b0}
        .btn-green{background:linear-gradient(135deg,#2d5a27,#1a3a15);color:#c8c0b0}
        .btn-orange{background:linear-gradient(135deg,#8b6914,#5c4400);color:#c8c0b0}
        .btn-gray{background:#333;color:#999;margin-top:4px}
        .pcard{background:#111;border-radius:10px;padding:12px;margin:4px 0;display:flex;justify-content:space-between;align-items:center;border-left:4px solid #333;cursor:pointer}
        .pcard.live{border-left-color:#c9a96e}.pcard.ded{border-left-color:#8b0000;opacity:.5}.pcard.wait{border-left-color:#d4a574}
        .ptag{padding:3px 8px;border-radius:8px;font-size:11px;font-weight:700;color:#0d0d0d}
        .ptag-l{background:#c9a96e}.ptag-d{background:#8b0000;color:#c8c0b0}.ptag-w{background:#d4a574}
        .empty{color:#555;text-align:center;padding:24px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:999;justify-content:center;align-items:center}
        .modal.show{display:flex}
        .modal-box{background:#1a1a1a;border-radius:18px;padding:24px;max-width:320px;width:90%;text-align:center;border:2px solid #c9a96e}
        .modal-box h3{color:#c9a96e;margin-bottom:8px}
        .log{background:#111;border-radius:10px;padding:8px;max-height:100px;overflow-y:auto;font-size:11px;line-height:1.6;margin-top:8px;border:1px solid #333}
        .log .lk{color:#8b0000}.log .li{color:#c9a96e}.log .lr{color:#2d5a27}
        input{width:100%;padding:14px;border-radius:10px;border:1px solid #333;background:#111;color:#c8c0b0;font-size:15px;margin:6px 0}
        input:focus{outline:none;border-color:#c9a96e}
        .flash-red{animation:fr .5s}@keyframes fr{50%{background:rgba(139,0,0,.3)}}
        .flash-green{animation:fg .5s}@keyframes fg{50%{background:rgba(201,169,110,.2)}}
    </style>
</head>
<body>
<div class="container">
<div id="loginScreen" style="padding-top:30px">
<div style="text-align:center;margin-bottom:20px"><div style="font-size:56px">⚔️</div><h2 style="color:#c9a96e">执行部任务</h2><p style="color:#666;font-size:12px">卡塞尔学院 · 屠龙行动</p></div>
<input type="text" id="nameInput" placeholder="🎯 输入你的代号"><input type="text" id="roomInput" placeholder="🔢 任务编号（4位数字）">
<button class="btn btn-green" onclick="joinGame()">⚔️ 加入任务</button>
<button class="btn btn-gold" onclick="createRoom()">🏰 创建任务</button>
</div>

<div id="gameScreen" style="display:none">
<div class="topbar"><h1>⚔️ 执行部</h1><span style="font-weight:800;color:#c9a96e">🔑 <span id="roomDisp"></span></span></div>
<div class="stat-row">
<div class="stat-box sa"><div class="n" id="aliveNum">0</div><div style="font-size:10px;color:#c9a96e">🟢 存活</div></div>
<div class="stat-box sw"><div class="n" id="waitNum">0</div><div style="font-size:10px;color:#d4a574">🟠 待确认</div></div>
<div class="stat-box sd"><div class="n" id="deadNum">0</div><div style="font-size:10px;color:#8b0000">💀 阵亡</div></div>
</div>
<div class="name-row"><span class="alive-c" id="aliveNames"></span><span class="wait-c" id="waitNames"></span><span class="dead-c" id="deadNames"></span></div>
<div style="font-size:12px;color:#666;margin:4px 0">👤 <span id="myNameDisp" style="color:#c9a96e;font-weight:800"></span></div>
<div class="tabs">
<div class="tab-btn active" onclick="switchTab('players')">👥 队员</div>
<div class="tab-btn inactive" onclick="switchTab('bag')">🎒 装备</div>
<div class="tab-btn inactive" onclick="switchTab('log')">📜 战报</div>
</div>
<div class="page" id="pagePlayers"><div id="playerList"></div></div>
<div class="page" id="pageBag" style="display:none"><div id="bagArea"></div></div>
<div class="page" id="pageLog" style="display:none"><div class="log" id="logArea" style="max-height:250px"></div></div>
</div>
</div>

<div class="modal" id="killModal"><div class="modal-box"><h3>⚠️ 确认击杀</h3><p id="killName" style="font-size:18px;color:#8b0000"></p><button class="btn btn-red" id="btnKill">✅ 确认击杀</button><button class="btn" onclick="closeModal('killModal')" style="background:#333;color:#999;margin-top:4px">❌ 取消</button></div></div>
<div class="modal" id="confirmModal"><div class="modal-box"><h3>💀 你被击杀了！</h3><p id="confirmKiller" style="font-size:18px;color:#8b0000"></p><button class="btn btn-orange" id="btnConfirm">😵 确认阵亡</button><button class="btn btn-gray" id="btnDeny">🤚 否认</button></div></div>
<div class="modal" id="useModal"><div class="modal-box"><h3 id="useTitle"></h3><div id="useBody"></div><button class="btn" onclick="closeModal('useModal')" style="background:#333;color:#999;margin-top:4px">取消</button></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL='https://mswgibltwekuwkkllkrk.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zd2dpYmx0d2VrdXdra2xsa3JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzOTQwODUsImV4cCI6MjA5NTk3MDA4NX0.7eraxZGiQqVyIp6ow6R9DsfGPe5lTELcd-bRCL4gFj8';
const sb=window.supabase.createClient(SB_URL,SB_KEY);
let myName='',roomId='',players=[],myItems=[],gameLog=[],pollTimer=null;

function showModal(id){document.getElementById(id).classList.add('show')}
function closeModal(id){document.getElementById(id).classList.remove('show')}
function switchTab(t){
    document.querySelectorAll('.tab-btn').forEach((b,i)=>{b.className=(['players','bag','log'][i]===t)?'tab-btn active':'tab-btn inactive'});
    ['pagePlayers','pageBag','pageLog'].forEach(id=>document.getElementById(id).style.display='none');
    document.getElementById('page'+(t==='players'?'Players':t==='bag'?'Bag':'Log')).style.display='block';
}

function speak(text){if('speechSynthesis' in window){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='zh-CN';u.rate=1.2;u.pitch=1.1;speechSynthesis.speak(u)}}

async function createRoom(){
    roomId=Math.floor(1000+Math.random()*9000).toString();
    document.getElementById('roomInput').value=roomId;
    const{error}=await sb.from('rooms').upsert({id:roomId,status:'waiting',created_at:new Date().toISOString()});
    if(error){alert('创建失败：'+error.message);return}
    alert('✅ 任务编号：'+roomId);
}

async function joinGame(){
    myName=document.getElementById('nameInput').value.trim();
    roomId=document.getElementById('roomInput').value.trim();
    if(!myName)return alert('请输入代号');
    if(!roomId||roomId.length!==4||isNaN(roomId))return alert('请输入4位任务编号');
    const{data:room,error:err1}=await sb.from('rooms').select('*').eq('id',roomId).single();
    if(err1||!room)return alert('❌ 任务不存在');
    const{error:err2}=await sb.from('players').upsert({room_id:roomId,name:myName,alive:true,waiting_kill:null,items:'[]'},{onConflict:'room_id,name'});
    if(err2){alert('加入失败：'+err2.message);return}
    myItems=[];gameLog=[];
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('gameScreen').style.display='block';
    document.getElementById('roomDisp').textContent=roomId;
    document.getElementById('myNameDisp').textContent=myName;
    addLog('⚔️ 任务开始！共 '+players.length+' 人');
    speak('任务开始！');
    await loadPlayers();
    startPolling();
    renderAll();
}

async function loadPlayers(){
    const{data}=await sb.from('players').select('*').eq('room_id',roomId);
    if(data)players=data.map(p=>({id:p.id,name:p.name,alive:p.alive,waitingKill:p.waiting_kill}));
    const me=players.find(p=>p.name===myName);
    if(me&&me.waitingKill&&!document.getElementById('confirmModal').classList.contains('show')){
        document.getElementById('confirmKiller').textContent=me.waitingKill;
        showModal('confirmModal');speak('你被'+me.waitingKill+'击杀了！');
    }
}

function startPolling(){pollTimer=setInterval(async()=>{await loadPlayers();renderAll();checkEnd()},2000)}
function checkEnd(){
    const alv=players.filter(p=>p.alive&&!p.waitingKill);
    if(alv.length<=1&&players.filter(p=>p.waitingKill).length===0&&players.length>0){
        addLog('🏆 任务结束！幸存者：'+(alv[0]?.name||'无人'));speak('任务结束！');clearInterval(pollTimer);
    }
}

let killTarget='';
function clickP(name){
    if(name===myName)return;const p=players.find(p=>p.name===name);
    if(!p||!p.alive||p.waitingKill)return;
    killTarget=name;document.getElementById('killName').textContent=name;showModal('killModal');
}

async function doKill(){
    if(!killTarget)return;
    await sb.from('players').update({waiting_kill:myName}).eq('room_id',roomId).eq('name',killTarget);
    addLog('⚡ '+myName+' 发起击杀 '+killTarget);closeModal('killModal');killTarget='';
    await loadPlayers();renderAll();
}

async function confirmKilled(){
    const me=players.find(p=>p.name===myName);if(!me||!me.waitingKill)return;
    const kn=me.waitingKill;me.alive=false;me.waitingKill=null;
    await sb.from('players').update({alive:false,waiting_kill:null}).eq('room_id',roomId).eq('name',myName);
    addLog('💀 '+kn+' 击杀了 '+myName);speak(kn+'击杀了'+myName);
    document.body.classList.add('flash-red');setTimeout(()=>document.body.classList.remove('flash-red'),500);
    const rwd=[{name:'📍 定位言灵',icon:'📍',type:'track'},{name:'🔄 复活炼金',icon:'🔄',type:'revive'},{name:'🔮 雷达言灵',icon:'🔮',type:'radar'}][Math.floor(Math.random()*3)];
    myItems.push(rwd);addLog('🏆 战利品：'+rwd.name);closeModal('confirmModal');
    await loadPlayers();renderAll();checkEnd();
}

async function denyKill(){
    const me=players.find(p=>p.name===myName);if(!me||!me.waitingKill)return;
    me.waitingKill=null;await sb.from('players').update({waiting_kill:null}).eq('room_id',roomId).eq('name',myName);
    addLog('🤚 '+myName+' 否认被击杀');closeModal('confirmModal');await loadPlayers();renderAll();
}

function useItem(idx){
    const item=myItems[idx];
    if(item.type==='track'){
        const tg=players.filter(p=>p.alive&&!p.waitingKill&&p.name!==myName);if(!tg.length)return alert('无目标');
        document.getElementById('useTitle').textContent='📍 定位言灵';
        document.getElementById('useBody').innerHTML=tg.map(p=>`<button class="btn btn-gold" onclick="doTrack('${p.name}',${idx})">📍 ${p.name}</button>`).join('');
        showModal('useModal');
    }else if(item.type==='revive'){
        const tg=players.filter(p=>!p.alive);if(!tg.length)return alert('无人可复活');
        document.getElementById('useTitle').textContent='🔄 复活炼金';
        document.getElementById('useBody').innerHTML=tg.map(p=>`<button class="btn btn-green" onclick="doRevive('${p.name}',${idx})">🔄 ${p.name}</button>`).join('');
        showModal('useModal');
    }else if(item.type==='radar'){
        const alv=players.filter(p=>p.alive);
        document.getElementById('useTitle').textContent='🔮 雷达言灵';
        document.getElementById('useBody').innerHTML='<p style="color:#c9a96e;font-weight:700">📡 存活队员：'+alv.map(p=>p.name).join('、')+'</p>';
        showModal('useModal');myItems.splice(idx,1);addLog('🔮 使用雷达言灵');speak('雷达扫描完成');
        setTimeout(()=>{closeModal('useModal');renderAll()},2000);
    }
}

async function doTrack(name,idx){addLog('📍 '+myName+' 定位 '+name);alert('📍 '+name+' 的位置已显示（5分钟）');myItems.splice(idx,1);closeModal('useModal');renderAll()}
async function doRevive(name,idx){
    await sb.from('players').update({alive:true,waiting_kill:null}).eq('room_id',roomId).eq('name',name);
    addLog('🔄 '+myName+' 复活了 '+name);speak(name+'重返战场！');
    document.body.classList.add('flash-green');setTimeout(()=>document.body.classList.remove('flash-green'),500);
    myItems.splice(idx,1);closeModal('useModal');await loadPlayers();renderAll();
}

function renderAll(){
    const alv=players.filter(p=>p.alive&&!p.waitingKill),wait=players.filter(p=>p.waitingKill),ded=players.filter(p=>!p.alive);
    document.getElementById('aliveNum').textContent=alv.length;document.getElementById('waitNum').textContent=wait.length;document.getElementById('deadNum').textContent=ded.length;
    document.getElementById('aliveNames').textContent='🟢 '+(alv.length?alv.map(p=>p.name).join('、'):'无');
    document.getElementById('waitNames').textContent=wait.length?'  |  🟠 '+wait.map(p=>p.name+'←'+p.waitingKill).join('、'):'';
    document.getElementById('deadNames').textContent=ded.length?'  |  💀 '+ded.map(p=>p.name).join('、'):'';
    document.getElementById('playerList').innerHTML=players.map(p=>{
        let cls='live',tagCls='ptag-l',tagText='存活';if(!p.alive){cls='ded';tagCls='ptag-d';tagText='阵亡'}if(p.waitingKill){cls='wait';tagCls='ptag-w';tagText='待确认←'+p.waitingKill}
        return `<div class="pcard ${cls}" onclick="${p.alive&&!p.waitingKill&&p.name!==myName?"clickP('"+p.name+"')":''}"><span style="font-weight:800">${!p.alive?'💀':p.waitingKill?'🟠':'🟢'} ${p.name}${p.name===myName?' (你)':''}</span><span class="ptag ${tagCls}">${tagText}</span></div>`;
    }).join('');
    document.getElementById('bagArea').innerHTML=myItems.length?myItems.map((it,i)=>`<button class="btn btn-gold" style="width:auto;display:inline-block;margin:3px;padding:10px 16px" onclick="useItem(${i})">${it.icon} ${it.name}</button>`).join(''):'<div class="empty">🎒 装备空空如也</div>';
    document.getElementById('logArea').innerHTML=gameLog.slice(-15).reverse().map(l=>`<div style="padding:2px 0;border-bottom:1px solid #222"><span style="color:#555;font-size:10px">${l.time}</span> <span class="l${l.type}">${l.msg}</span></div>`).join('');
}

function addLog(msg){
    const type=msg.includes('💀')?'k':msg.includes('🎁')||msg.includes('🏆')||msg.includes('🔮')||msg.includes('📍')?'i':'r';
    gameLog.push({msg,time:new Date().toLocaleTimeString(),type});renderAll();
}

document.getElementById('btnKill').addEventListener('click',doKill);
document.getElementById('btnConfirm').addEventListener('click',confirmKilled);
document.getElementById('btnDeny').addEventListener('click',denyKill);
</script>
</body>
</html>
