const log = (msg) => document.getElementById('log').textContent += msg + '\n';

async function test() {
    const rid = Math.floor(1000+Math.random()*9000).toString();
    log('创建房间: '+rid);
    let r = await sb.from('rooms').upsert({id:rid,status:'waiting'});

    r = await sb.from('players').upsert({room_id:rid, name:'测试员', alive:true, hearts:1}, {onConflict:'room_id,name'});
    log('players写入: ' + (r.error ? r.error.message : 'OK'));
    
    r = await sb.from('players').select('*').eq('room_id',rid);
    log('查询玩家: ' + JSON.stringify(r.data));
    log('玩家人数: ' + (r.data ? r.data.length : 0));
}
