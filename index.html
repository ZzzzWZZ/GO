<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏃 撕名牌大作战</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#0d0d0d;color:#fff;min-height:100vh}
        .container{max-width:500px;margin:0 auto;padding:12px}
        .topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:linear-gradient(135deg,#ffd100,#ffb800);border-radius:14px;margin-bottom:10px;color:#0d0d0d}
        .topbar h3{font-size:17px}
        .btn{padding:12px 20px;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;margin:3px;width:100%}
        .btn-gold{background:linear-gradient(135deg,#ffd100,#ffb800);color:#0d0d0d}
        .btn-green{background:linear-gradient(135deg,#00b894,#00a381);color:#fff}
        .btn-red{background:linear-gradient(135deg,#e17055,#d63031);color:#fff}
        .btn-orange{background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff}
        .btn-gray{background:#333;color:#999}
        .btn-sm{padding:8px 14px;font-size:12px;border-radius:8px;width:auto}
        .card{background:#1a1a2e;border-radius:12px;padding:16px;margin:8px 0;border:2px solid #333}
        .stat-row{display:flex;gap:6px;margin:8px 0}
        .stat{flex:1;background:#1a1a2e;border-radius:10px;padding:10px;text-align:center;border:2px solid #333}
        .stat .n{font-size:22px;font-weight:900}.stat .l{font-size:10px;color:#888}
        .prow{display:flex;justify-content:space-between;align-items:center;padding:10px;background:#222;border-radius:8px;margin:4px 0;border-left:4px solid #00b894;cursor:pointer}
        .prow.dead{border-left-color:#e17055;opacity:.5}.prow.wait{border-left-color:#f39c12}
        .tag{display:inline-block;background:#ffd100;color:#333;padding:4px 10px;border-radius:12px;font-size:12px;font-weight:700;margin:2px}
        .tag.red{background:#e17055;color:#fff}.tag.blue{background:#0984e3;color:#fff}
        input,select{width:100%;padding:14px;border-radius:10px;border:2px solid #333;background:#1a1a2e;color:#fff;font-size:15px;margin:6px 0}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:999;justify-content:center;align-items:center}
        .modal.show{display:flex}
        .modal-box{background:#1a1a2e;border-radius:18px;padding:24px;max-width:350px;width:90%;text-align:center;border:2px solid #ffd100}
        .modal-box h3{color:#ffd100;margin-bottom:8px}
        .log-box{background:#111;border-radius:8px;padding:8px;max-height:120px;overflow-y:auto;font-size:11px;line-height:1.6;margin-top:8px}
        .win-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:9999;justify-content:center;align-items:center;flex-direction:column}
        .win-overlay.show{display:flex}
        .win-overlay .trophy{font-size:80px}
        .win-overlay .win-text{color:#ffd100;font-size:28px;font-weight:900;margin:16px 0}
        .win-overlay .win-name{color:#fff;font-size:36px;font-weight:900}
        .revive-bar{background:#e17055;color:#fff;padding:10px;border-radius:10px;text-align:center;font-weight:700;font-size:14px;margin:6px 0}
    </style>
</head>
<body>
<div class="container">

<div id="loginScreen">
    <div style="text-align:center;padding:40px 0"><div style="font-size:64px">🏃</div><h2 style="color:#ffd100">撕名牌大作战</h2></div>
    <input type="text" id="loginUser" placeholder="用户名"><input type="password" id="loginPass" placeholder="密码">
    <button class="btn btn-gold" onclick="register()">📝 注册</button>
    <button class="btn btn-green" onclick="login()">🔑 登录</button>
</div>

<div id="lobbyScreen" style="display:none">
    <div class="topbar"><h3>🏃 等待大厅</h3><span>👤 <span id="myNameDisp" style="color:#e17055"></span></span></div>
    <div class="card">
        <p>房间号：<strong style="color:#ffd100" id="roomDisp">----</strong> <span id="hostTag"></span></p>
        <button class="btn btn-gold" id="createBtn" onclick="createRoom()">🏠 创建房间</button>
        <input type="text" id="joinInput" placeholder="输入房间号"><button class="btn btn-green" onclick="joinRoom()">🎮 加入房间</button>
        <button class="btn btn-orange" id="startBtn" style="display:none" onclick="startGame()">⚡ 开始游戏</button>
    </div>
    <div class="card"><p>玩家列表：<span id="playerCount">0</span>人</p><div id="playerTags"></div></div>
</div>

<div id="gameScreen" style="display:none">
    <div class="topbar"><h3>🏃 <span id="modeTitle">经典模式</span></h3><span>🔑 <span id="gameRoomDisp"></span></span></div>
    <div class="stat-row"><div class="stat" style="border-color:#00b894"><div class="n" style="color:#00b894" id="aliveNum">0</div><div class="l">🟢 存活</div></div><div class="stat" style="border-color:#f39c12"><div class="n" style="color:#f39c12" id="waitNum">0</div><div class="l">🟠 待确认</div></div><div class="stat" style="border-color:#e17055"><div class="n" style="color:#e17055" id="deadNum">0</div><div class="l">💀 淘汰</div></div></div>
    <div class="revive-bar" id="reviveBar" style="display:none">💀 使用复活卡？<span id="reviveCountdown"></span> <button class="btn btn-sm btn-orange" onclick="useReviveSelf()">复活自己</button> <button class="btn btn-sm btn-green" onclick="showReviveTeammate()">复活队友</button> <button class="btn btn-sm btn-gray" onclick="declineRevive()">放弃</button></div>
    <div class="card"><div id="playerList"></div></div>
    <div class="card"><p>🎒 背包</p><div id="bagArea"></div></div>
    <div class="log-box" id="logArea"></div>
</div>

<div class="win-overlay" id="winOverlay"><div class="trophy">🏆</div><div class="win-text">游戏结束</div><div class="win-name" id="winName"></div><button class="btn btn-gold" onclick="location.reload()">🔄 再来一局</button></div>

<div class="modal" id="killModal"><div class="modal-box"><h3>⚠️ 确认撕掉</h3><p id="killName" style="font-size:18px;color:#e17055"></p><button class="btn btn-red" id="btnKill">✅ 确认撕掉</button><button class="btn btn-gray" onclick="document.getElementById('killModal').classList.remove('show')">❌ 取消</button></div></div>
<div class="modal" id="confirmModal"><div class="modal-box"><h3>💀 你被撕了！</h3><p id="confirmKiller" style="font-size:18px;color:#e17055"></p><button class="btn btn-orange" id="btnConfirm">😵 确认淘汰</button><button class="btn btn-gray" id="btnDeny">🤚 否认</button></div></div>
<div class="modal" id="useModal"><div class="modal-box"><h3 id="useTitle"></h3><div id="useBody"></div><button class="btn btn-gray" onclick="document.getElementById('useModal').classList.remove('show')">取消</button></div></div>
<div class="modal" id="reviveModal"><div class="modal-box"><h3>🔄 选择复活对象</h3><div id="reviveTargets"></div><button class="btn btn-gray" onclick="document.getElementById('reviveModal').classList.remove('show')">取消</button></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb=window.supabase.createClient('https://mswgibltwekuwkkllkrk.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zd2dpYmx0d2VrdXdra2xsa3JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzOTQwODUsImV4cCI6MjA5NTk3MDA4NX0.7eraxZGiQqVyIp6ow6R9DsfGPe5lTELcd-bRCL4gFj8');
let myName='',roomId='',isHost=false,gameMode='classic',players=[],myItems=[],gameLog=[],pollTimer=null,lobbyTimer=null,reviveTimer=null,reviveSec=180;
const itemPool=[{name:'📍 定位卡',icon:'📍',type:'track'},{name:'🔄 复活卡',icon:'🔄',type:'revive'},{name:'🔮 雷达卡',icon:'🔮',type:'radar'},{name:'💚 双命卡',icon:'💚',type:'double'},{name:'🛡️ 反弹卡',icon:'🛡️',type:'rebound'}];

function speak(text){if('speechSynthesis' in window){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='zh-CN';u.rate=1.3;u.pitch=1.3;speechSynthesis.speak(u)}}

// ============ 登录 ============
async function register(){const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value.trim();if(!u||!p)return alert('请输入用户名和密码');const{data:ex}=await sb.from('users').select('*').eq('username',u).single();if(ex)return alert('用户名已存在');await sb.from('users').insert({username:u,password:p});alert('注册成功！请登录')}
async function login(){const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value.trim();const{data:user}=await sb.from('users').select('*').eq('username',u).eq('password',p).single();if(!user)return alert('用户名或密码错误');myName=u;document.getElementById('loginScreen').style.display='none';document.getElementById('lobbyScreen').style.display='block';document.getElementById('myNameDisp').textContent=u}

// ============ 房间 ============
async function createRoom(){roomId=Math.floor(1000+Math.random()*9000).toString();isHost=true;gameMode='classic';document.getElementById('roomDisp').textContent=roomId;document.getElementById('hostTag').textContent='(房主👑)';document.getElementById('startBtn').style.display='block';await sb.from('rooms').upsert({id:roomId,status:'waiting',host:myName});await sb.from('players').upsert({room_id:roomId,name:myName,alive:true,hearts:1},{onConflict:'room_id,name'});refreshLobby();lobbyTimer=setInterval(refreshLobby,2000)}
async function joinRoom(){roomId=document.getElementById('joinInput').value.trim();if(!roomId)return;const{data:room}=await sb.from('rooms').select('*').eq('id',roomId).single();if(!room)return alert('房间不存在');isHost=false;document.getElementById('roomDisp').textContent=roomId;document.getElementById('startBtn').style.display='none';await sb.from('players').upsert({room_id:roomId,name:myName,alive:true,hearts:1},{onConflict:'room_id,name'});refreshLobby();lobbyTimer=setInterval(refreshLobby,2000)}
async function refreshLobby(){const{data}=await sb.from('players').select('*').eq('room_id',roomId);if(!data)return;document.getElementById('playerCount').textContent=data.length;document.getElementById('playerTags').innerHTML=data.map(p=>`<span class="tag">${p.name}${p.name===myName&&isHost?' 👑':''}</span>`).join(' ');const{data:room}=await sb.from('rooms').select('*').eq('id',roomId).single();if(room&&room.status==='playing'){clearInterval(lobbyTimer);await loadPlayers();startGameScreen()}}

// ============ 开始游戏 ============
async function startGame(){await sb.from('rooms').update({status:'playing'}).eq('id',roomId);clearInterval(lobbyTimer);await loadPlayers();startGameScreen()}
function startGameScreen(){document.getElementById('lobbyScreen').style.display='none';document.getElementById('gameScreen').style.display='block';document.getElementById('gameRoomDisp').textContent=roomId;myItems=[];gameLog=[];addLog('🎮 游戏开始！');speak('游戏开始！');startPolling();renderAll()}

// ============ 加载玩家 ============
async function loadPlayers(){const{data}=await sb.from('players').select('*').eq('room_id',roomId);if(data)players=data.map(p=>({id:p.id,name:p.name,alive:p.alive,waitingKill:p.waiting_kill,hearts:p.hearts||1}));const me=players.find(p=>p.name===myName);if(me&&me.waitingKill&&!document.getElementById('confirmModal').classList.contains('show')){document.getElementById('confirmKiller').textContent=me.waitingKill;document.getElementById('confirmModal').classList.add('show');speak('你被'+me.waitingKill+'撕了！')}}
function startPolling(){pollTimer=setInterval(async()=>{await loadPlayers();renderAll();checkEnd()},2000)}
function checkEnd(){const alv=players.filter(p=>p.alive);if(alv.length<=1&&players.length>0){const w=alv[0]?.name||'无人';addLog('🏆 游戏结束！获胜者：'+w);speak('游戏结束！');clearInterval(pollTimer);document.getElementById('winName').textContent=w;document.getElementById('winOverlay').classList.add('show')}}

// ============ 淘汰 ============
let killTarget='';
function clickP(name){if(name===myName)return;const me=players.find(p=>p.name===myName);if(!me||!me.alive)return;const p=players.find(p=>p.name===name);if(!p||!p.alive||p.waitingKill)return;killTarget=name;document.getElementById('killName').textContent=name;document.getElementById('killModal').classList.add('show')}
async function doKill(){if(!killTarget)return;const p=players.find(p=>p.name===killTarget);if(!p)return;if(p.hearts>1){p.hearts--;await sb.from('players').update({hearts:p.hearts}).eq('room_id',roomId).eq('name',killTarget);addLog('💚 '+killTarget+' 消耗一心剩'+p.hearts);speak(killTarget+'失去一颗心！')}else{p.waitingKill=myName;await sb.from('players').update({waiting_kill:myName}).eq('room_id',roomId).eq('name',killTarget);addLog('⚡ '+myName+' 发起淘汰 '+killTarget)}document.getElementById('killModal').classList.remove('show');killTarget='';await loadPlayers();renderAll()}
async function confirmKilled(){const me=players.find(p=>p.name===myName);if(!me||!me.waitingKill)return;const kn=me.waitingKill;me.alive=false;me.waitingKill=null;await sb.from('players').update({alive:false,waiting_kill:null}).eq('room_id',roomId).eq('name',myName);addLog('💀 '+kn+' 淘汰了 '+myName);speak(kn+'淘汰了'+myName);document.getElementById('confirmModal').classList.remove('show');checkRevive();const rwd=itemPool[Math.floor(Math.random()*5)];myItems.push(rwd);addLog('🏆 奖励：'+rwd.name);saveItems();await loadPlayers();renderAll();checkEnd()}
async function denyKill(){const me=players.find(p=>p.name===myName);if(!me||!me.waitingKill)return;me.waitingKill=null;await sb.from('players').update({waiting_kill:null}).eq('room_id',roomId).eq('name',myName);addLog('🤚 '+myName+' 否认被撕');document.getElementById('confirmModal').classList.remove('show');await loadPlayers();renderAll()}

// ============ 复活 ============
function checkRevive(){const me=players.find(p=>p.name===myName);if(!me||me.alive)return;const idx=myItems.findIndex(i=>i.type==='revive');if(idx===-1)return;reviveSec=180;document.getElementById('reviveBar').style.display='block';updateReviveCountdown();reviveTimer=setInterval(()=>{reviveSec--;updateReviveCountdown();if(reviveSec<=0)declineRevive()},1000)}
function updateReviveCountdown(){document.getElementById('reviveCountdown').textContent=Math.floor(reviveSec/60)+':'+String(reviveSec%60).padStart(2,'0')}
function useReviveSelf(){const idx=myItems.findIndex(i=>i.type==='revive');if(idx===-1)return;const me=players.find(p=>p.name===myName);if(!me)return;me.alive=true;me.hearts=1;sb.from('players').update({alive:true,hearts:1}).eq('room_id',roomId).eq('name',myName);myItems.splice(idx,1);saveItems();clearReviveBar();addLog('🔄 '+myName+' 复活了自己');speak(myName+'复活了！');loadPlayers();renderAll()}
function showReviveTeammate(){document.getElementById('reviveModal').classList.add('show');const d=players.filter(p=>!p.alive&&p.name!==myName);document.getElementById('reviveTargets').innerHTML=d.length?d.map(p=>`<button class="btn btn-sm btn-green" onclick="reviveTeammate('${p.name}')" style="margin:3px">🔄 ${p.name}</button>`).join(''):'<p style="color:#888">无淘汰队友</p>'}
async function reviveTeammate(name){const idx=myItems.findIndex(i=>i.type==='revive');if(idx===-1)return;await sb.from('players').update({alive:true,hearts:1}).eq('room_id',roomId).eq('name',name);myItems.splice(idx,1);saveItems();document.getElementById('reviveModal').classList.remove('show');clearReviveBar();addLog('🔄 '+myName+' 复活了 '+name);speak(name+'复活了！');loadPlayers();renderAll()}
function declineRevive(){clearReviveBar()}function clearReviveBar(){clearInterval(reviveTimer);document.getElementById('reviveBar').style.display='none'}

// ============ 道具 ============
function useItem(idx){const item=myItems[idx];if(item.type==='track'){const tg=players.filter(p=>p.alive&&p.name!==myName);if(!tg.length)return alert('无目标');document.getElementById('useTitle').textContent='📍 定位卡';document.getElementById('useBody').innerHTML=tg.map(p=>`<button class="btn btn-gold" onclick="doTrack('${p.name}',${idx})">📍 ${p.name}</button>`).join('');document.getElementById('useModal').classList.add('show')}else if(item.type==='revive'){const tg=players.filter(p=>!p.alive);if(!tg.length)return alert('无人可复活');document.getElementById('useTitle').textContent='🔄 复活卡';document.getElementById('useBody').innerHTML=tg.map(p=>`<button class="btn btn-green" onclick="doRevive('${p.name}',${idx})">🔄 ${p.name}</button>`).join('');document.getElementById('useModal').classList.add('show')}else if(item.type==='radar'){const alv=players.filter(p=>p.alive);document.getElementById('useTitle').textContent='🔮 雷达卡';document.getElementById('useBody').innerHTML='<p style="color:#00b894">📡 存活：'+alv.map(p=>p.name).join('、')+'</p>';document.getElementById('useModal').classList.add('show');myItems.splice(idx,1);saveItems();addLog('🔮 使用雷达卡');speak('雷达扫描完成');setTimeout(()=>{document.getElementById('useModal').classList.remove('show');renderAll()},2000)}else if(item.type==='double'){const me=players.find(p=>p.name===myName);if(!me)return;me.hearts=(me.hearts||1)+1;sb.from('players').update({hearts:me.hearts}).eq('room_id',roomId).eq('name',myName);myItems.splice(idx,1);saveItems();addLog('💚 '+myName+' 使用双命卡');speak(myName+'生命+1！');renderAll()}else if(item.type==='rebound'){alert('🛡️ 反弹卡已自动装备')}}
async function doTrack(name,idx){addLog('📍 '+myName+' 定位 '+name);alert('📍 '+name+' 已定位');myItems.splice(idx,1);saveItems();document.getElementById('useModal').classList.remove('show');renderAll()}
async function doRevive(name,idx){await sb.from('players').update({alive:true,hearts:1}).eq('room_id',roomId).eq('name',name);addLog('🔄 '+myName+' 复活了 '+name);speak(name+'复活了！');myItems.splice(idx,1);saveItems();document.getElementById('useModal').classList.remove('show');loadPlayers();renderAll()}

// ============ 渲染 ============
function renderAll(){const alv=players.filter(p=>p.alive),ded=players.filter(p=>!p.alive),wait=players.filter(p=>p.waitingKill);document.getElementById('aliveNum').textContent=alv.length;document.getElementById('waitNum').textContent=wait.length;document.getElementById('deadNum').textContent=ded.length;document.getElementById('playerList').innerHTML=players.map(p=>{let cls='live';if(!p.alive)cls='dead';if(p.waitingKill)cls='wait';return `<div class="prow ${cls}" onclick="${p.alive&&!p.waitingKill&&p.name!==myName?"clickP('"+p.name+"')":''}"><span>${!p.alive?'💀':p.waitingKill?'🟠':'🟢'} ${p.name}${p.name===myName?' (你)':''}</span><span>${'❤️'.repeat(p.hearts||0)||'🖤'}</span></div>`}).join('');document.getElementById('bagArea').innerHTML=myItems.length?myItems.map((it,i)=>`<button class="btn btn-sm btn-gold" onclick="useItem(${i})">${it.icon} ${it.name}</button>`).join(' '):'<span style="color:#888">空空如也</span>';document.getElementById('logArea').innerHTML=gameLog.slice(-10).reverse().map(l=>`<div style="padding:2px 0;border-bottom:1px solid #222"><span style="color:#555;font-size:10px">${l.time}</span> ${l.msg}</div>`).join('')}
function addLog(msg){gameLog.push({msg,time:new Date().toLocaleTimeString()});renderAll()}
async function saveItems(){await sb.from('players').update({items:JSON.stringify(myItems)}).eq('room_id',roomId).eq('name',myName)}

// ============ 按钮 ============
document.getElementById('btnKill').addEventListener('click',doKill);
document.getElementById('btnConfirm').addEventListener('click',confirmKilled);
document.getElementById('btnDeny').addEventListener('click',denyKill);
</script>
</body>
</html>
