<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏃 撕名牌大作战</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(180deg,#fff7e6,#fffbf0,#e8f4fd);color:#2d3436;min-height:100vh;transition:background .3s}
        .container{max-width:500px;margin:0 auto;padding:12px}
        .topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:linear-gradient(135deg,#ffd100,#ffb800);border-radius:14px;margin-bottom:10px}
        .topbar h1{font-size:20px;color:#2d3436}
        .stat-row{display:flex;gap:8px;margin:8px 0}
        .stat-box{flex:1;padding:10px;border-radius:12px;text-align:center;font-weight:800;background:#fff}
        .sa{border:2px solid #00b894}.sa .n{color:#00b894;font-size:24px}
        .sd{border:2px solid #e17055}.sd .n{color:#e17055;font-size:24px}
        .sw{border:2px solid #f39c12}.sw .n{color:#f39c12;font-size:24px}
        .name-row{font-size:12px;line-height:1.6;background:#fff;border-radius:10px;padding:8px 12px;margin:4px 0}
        .alive-c{color:#00b894;font-weight:700}.dead-c{color:#e17055}.wait-c{color:#f39c12}
        .tabs{display:flex;gap:4px;margin:8px 0}
        .tab-btn{flex:1;text-align:center;padding:12px;font-size:14px;font-weight:800;cursor:pointer;border-radius:12px 12px 0 0;border:none}
        .tab-btn.active{background:#fff;color:#e17055}.tab-btn.inactive{background:#eee;color:#999}
        .page{background:#fff;border-radius:0 0 14px 14px;padding:12px;min-height:200px}
        .btn{padding:12px 20px;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;margin:3px;width:100%}
        .btn-gold{background:#ffd100;color:#333}.btn-red{background:#e17055;color:#fff}
        .btn-green{background:#00b894;color:#fff}.btn-orange{background:#f39c12;color:#fff}
        .btn-gray{background:#999;color:#fff;margin-top:4px}
        .pcard{background:#f9f9f9;border-radius:10px;padding:12px;margin:4px 0;display:flex;justify-content:space-between;align-items:center;border-left:4px solid #ddd;cursor:pointer;transition:all .4s}
        .pcard.live{border-left-color:#00b894}.pcard.ded{border-left-color:#e17055;opacity:.5;transform:scale(0.95);filter:grayscale(0.5)}.pcard.wait{border-left-color:#f39c12}
        .pcard.shatter{animation:shatter .6s forwards}
        @keyframes shatter{0%{transform:scale(1);opacity:1}50%{transform:scale(1.05);opacity:.6;filter:blur(2px)}100%{transform:scale(0.8);opacity:.3;filter:blur(4px)}}
        .ptag{padding:3px 8px;border-radius:8px;font-size:11px;font-weight:700;color:#fff}
        .ptag-l{background:#00b894}.ptag-d{background:#e17055}.ptag-w{background:#f39c12}
        .empty{color:#ccc;text-align:center;padding:24px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:999;justify-content:center;align-items:center}
        .modal.show{display:flex}
        .modal-box{background:#fff;border-radius:18px;padding:24px;max-width:320px;width:90%;text-align:center}
        .modal-box h3{color:#e17055;margin-bottom:8px}
        .log{background:#fff;border-radius:10px;padding:8px;max-height:100px;overflow-y:auto;font-size:11px;line-height:1.6;margin-top:8px}
        .log .lk{color:#e17055}.log .li{color:#f39c12}.log .lr{color:#00b894}
        input{width:100%;padding:14px;border-radius:10px;border:2px solid #ddd;font-size:15px;margin:6px 0;background:#fff;color:#2d3436}
        input:focus{outline:none;border-color:#ffd100}
        .waiting-room{text-align:center;padding:20px}
        .waiting-room h2{color:#e17055;margin-bottom:10px}
        .player-tag{display:inline-block;background:#ffd100;color:#333;padding:8px 16px;border-radius:20px;margin:4px;font-weight:700}
        #mapContainer{width:100%;height:220px;border-radius:12px;overflow:hidden;margin:8px 0;border:2px solid #ddd;position:relative}
        #amapContainer{width:100%;height:100%}
        .map-label{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.9);color:#2d3436;padding:4px 10px;border-radius:10px;font-size:11px;font-weight:700;z-index:10;pointer-events:none}
        .drop-card{background:#fffbf0;border-radius:12px;padding:12px;text-align:center;border:2px solid #ffd100;margin:8px 0;display:none}
        .drop-card.show{display:block}
        .drop-card .dicon{font-size:30px}.drop-card .dname{font-size:15px;font-weight:800;color:#e17055}
        .win-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:9999;justify-content:center;align-items:center;flex-direction:column}
        .win-overlay.show{display:flex}
        .win-overlay .trophy{font-size:80px;animation:bounce 1s infinite}
        @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
        .win-overlay .win-text{color:#ffd100;font-size:28px;font-weight:900;margin:16px 0}
        .win-overlay .win-name{color:#fff;font-size:36px;font-weight:900}
        .timer-bar{background:#ffeaa7;border-radius:10px;padding:8px;text-align:center;margin:6px 0;font-weight:700;color:#e17055}
    </style>
</head>
<body>
<div class="container">
<div id="loginScreen" style="padding-top:30px">
<div style="text-align:center;margin-bottom:20px"><div style="font-size:56px">🏃</div><h2 style="color:#e17055">撕名牌大作战</h2></div>
<input type="text" id="nameInput" placeholder="🎯 输入你的名字"><input type="text" id="roomInput" placeholder="🔢 房间号（4位数字）">
<button class="btn btn-green" id="btnJoin">🎮 加入房间</button>
<button class="btn btn-gold" id="btnCreate">🏠 创建新房间</button>
</div>

<div id="lobbyScreen" style="display:none;padding-top:20px">
<div class="waiting-room"><h2>⏳ 等待大厅</h2><p style="color:#888">房间号：<strong id="lobbyRoomDisp" style="color:#e17055"></strong></p><p style="color:#888;margin-bottom:16px">等待房主开始游戏...</p><div id="lobbyPlayerList" style="margin:12px 0"></div><p style="color:#888;font-size:12px">当前 <span id="lobbyCount">0</span> 人</p><button class="btn btn-orange" id="btnStartGame" style="display:none">⚡ 开始游戏</button><button class="btn btn-gray" id="btnLeaveLobby" style="margin-top:8px">🚪 离开房间</button></div>
</div>

<div id="gameScreen" style="display:none">
<div class="topbar"><h1>🏃 撕名牌</h1><span style="font-weight:800">🔑 <span id="roomDisp"></span></span></div>
<div class="stat-row"><div class="stat-box sa"><div class="n" id="aliveNum">0</div><div style="font-size:10px;color:#00b894">🟢 存活</div></div><div class="stat-box sw"><div class="n" id="waitNum">0</div><div style="font-size:10px;color:#f39c12">🟠 待确认</div></div><div class="stat-box sd"><div class="n" id="deadNum">0</div><div style="font-size:10px;color:#e17055">💀 淘汰</div></div></div>
<div class="name-row"><span class="alive-c" id="aliveNames"></span><span class="wait-c" id="waitNames"></span><span class="dead-c" id="deadNames"></span></div>
<div style="font-size:12px;color:#888;margin:4px 0">👤 <span id="myNameDisp" style="color:#e17055;font-weight:800"></span></div>
<div class="timer-bar" id="dropTimerBar">🎁 道具掉落：<span id="dropCountdown">6:00</span></div>
<div class="tabs"><div class="tab-btn active" id="tabBtnMap">🗺️ 地图</div><div class="tab-btn inactive" id="tabBtnPlayers">👥 玩家</div><div class="tab-btn inactive" id="tabBtnBag">🎒 背包</div><div class="tab-btn inactive" id="tabBtnLog">📜 日志</div></div>
<div class="page" id="pageMap"><div id="mapContainer"><div id="amapContainer"></div><div class="map-label">📍 <span id="rangeStatus" style="color:#00b894">范围内</span></div></div><div class="drop-card" id="dropCard"><div class="dicon" id="dropIcon"></div><div class="dname" id="dropName"></div><div style="font-size:12px;color:#0984e3" id="dropDist"></div><button class="btn btn-gold" onclick="pickupItem()" style="margin-top:6px">🎁 拾取道具</button></div></div>
<div class="page" id="pagePlayers" style="display:none"><div id="playerList"></div></div>
<div class="page" id="pageBag" style="display:none"><div id="bagArea"></div></div>
<div class="page" id="pageLog" style="display:none"><div class="log" id="logArea" style="max-height:250px"></div></div>
</div>
</div>

<div class="win-overlay" id="winOverlay"><div class="trophy">🏆</div><div class="win-text">游戏结束</div><div class="win-name" id="winName"></div><button class="btn btn-gold" onclick="location.reload()" style="margin-top:20px;width:200px">🔄 再来一局</button></div>

<div class="modal" id="killModal"><div class="modal-box"><h3>⚠️ 确认撕掉</h3><p id="killName" style="font-size:18px;color:#e17055"></p><button class="btn btn-red" id="btnKill">✅ 确认撕掉</button><button class="btn" id="btnCancelKill" style="background:#eee;color:#888;margin-top:4px">❌ 取消</button></div></div>
<div class="modal" id="confirmModal"><div class="modal-box"><h3>💀 你被撕了！</h3><p id="confirmKiller" style="font-size:18px;color:#e17055"></p><button class="btn btn-orange" id="btnConfirm">😵 确认淘汰</button><button class="btn btn-gray" id="btnDeny">🤚 否认</button></div></div>
<div class="modal" id="useModal"><div class="modal-box"><h3 id="useTitle"></h3><div id="useBody"></div><button class="btn" id="btnCancelUse" style="background:#eee;color:#888;margin-top:4px">取消</button></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL='https://mswgibltwekuwkkllkrk.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zd2dpYmx0d2VrdXdra2xsa3JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzOTQwODUsImV4cCI6MjA5NTk3MDA4NX0.7eraxZGiQqVyIp6ow6R9DsfGPe5lTELcd-bRCL4gFj8';
const AMAP_KEY='12530b113a60115d9e162efd22d93558';
const sb=window.supabase.createClient(SB_URL,SB_KEY);
let myName='',roomId='',isHost=false,players=[],myItems=[],gameLog=[],pollTimer=null,lobbyTimer=null,channel=null;
let userPos=null,currentDrop=null,dropSec=360,dropTimer=null,amap=null,userMarker=null,dropMarker=null;
const CENTER={lat:39.909,lng:116.397},RANGE_R=300;
const itemPool=[{name:'📍 定位卡',icon:'📍',type:'track'},{name:'🔄 复活卡',icon:'🔄',type:'revive'},{name:'🔮 雷达卡',icon:'🔮',type:'radar'}];

function showModal(id){document.getElementById(id).classList.add('show')}
function closeModal(id){document.getElementById(id).classList.remove('show')}
function switchTab(t){['Map','Players','Bag','Log'].forEach((n,i)=>{document.getElementById('tabBtn'+n).className=t===n.toLowerCase()?'tab-btn active':'tab-btn inactive';document.getElementById('page'+n).style.display=t===n.toLowerCase()?'block':'none'});if(t==='map')setTimeout(()=>{if(amap)amap.setFitView()},200)}

function speakLocal(text){if('speechSynthesis' in window){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='zh-CN';u.rate=1.3;u.pitch=1.3;speechSynthesis.speak(u)}}
function speakAll(text){speakLocal(text);if(channel){channel.send({type:'broadcast',event:'speak',payload:{text:text}})}}

function initAMap(){if(typeof AMap==='undefined'){setTimeout(initAMap,500);return}amap=new AMap.Map('amapContainer',{zoom:16,center:[CENTER.lng,CENTER.lat]});new AMap.Circle({center:[CENTER.lng,CENTER.lat],radius:RANGE_R,fillOpacity:.06,strokeColor:'#00b894',strokeWeight:3,strokeDasharray:[8,5]}).setMap(amap);userMarker=new AMap.Marker({position:[CENTER.lng,CENTER.lat],content:'<div style="background:#0984e3;color:#fff;padding:4px 10px;border-radius:12px;font-size:12px">⚡ 我</div>',offset:new AMap.Pixel(-15,-15)});userMarker.setMap(amap)}
function loadAMap(){if(typeof AMap!=='undefined'){initAMap();return}const s=document.createElement('script');s.src='https://webapi.amap.com/maps?v=2.0&key='+AMAP_KEY+'&callback=onAMapLoad';window.onAMapLoad=initAMap;document.head.appendChild(s)}
loadAMap();

function getUserPos(){if(navigator.geolocation){navigator.geolocation.watchPosition(p=>{userPos={lat:p.coords.latitude,lng:p.coords.longitude};if(amap&&userMarker){userMarker.setPosition([userPos.lng,userPos.lat])}checkDropDist()},()=>{}, {enableHighAccuracy:true})}}
function dist(a,b){const R=6371000;const dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180;const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)))}

function spawnDropItem(){const item=itemPool[Math.floor(Math.random()*itemPool.length)],rlat=CENTER.lat+(Math.random()-.5)*.003,rlng=CENTER.lng+(Math.random()-.5)*.003;currentDrop={...item,lat:rlat,lng:rlng};document.getElementById('dropIcon').textContent=item.icon;document.getElementById('dropName').textContent=item.name;document.getElementById('dropCard').classList.remove('show');if(dropMarker){dropMarker.setMap(null)}if(amap){dropMarker=new AMap.Marker({position:[rlng,rlat],content:'<div style="background:#ffd100;color:#333;padding:4px 10px;border-radius:14px;font-size:12px;font-weight:700">'+item.icon+'</div>',offset:new AMap.Pixel(-15,-15)});dropMarker.setMap(amap)}speakAll('道具已刷新！')}
function checkDropDist(){if(!currentDrop||!userPos)return;const d=dist(userPos,currentDrop);const card=document.getElementById('dropCard');if(d<=15){card.classList.add('show');document.getElementById('dropDist').textContent='📏 '+d+' 米 ✅ 可拾取'}else{card.classList.remove('show');document.getElementById('dropDist').textContent='📏 '+d+' 米'}}
function pickupItem(){if(!currentDrop)return;const d=userPos?dist(userPos,currentDrop):999;if(d>15)return alert('❌ 距离太远！');myItems.push({name:currentDrop.name,icon:currentDrop.icon,type:currentDrop.type});addLog('🎁 '+myName+' 拾取了 '+currentDrop.name);speakAll(myName+'拾取了'+currentDrop.name);currentDrop=null;document.getElementById('dropCard').classList.remove('show');if(dropMarker){dropMarker.setMap(null);dropMarker=null}renderAll()}
function startDropTimer(){dropSec=360;updateDropDisplay();dropTimer=setInterval(()=>{dropSec--;updateDropDisplay();if(dropSec<=0){spawnDropItem();dropSec=360}},1000)}
function updateDropDisplay(){const m=Math.floor(dropSec/60),s=dropSec%60;document.getElementById('dropCountdown').textContent=m+':'+String(s).padStart(2,'0')}

function subscribeChannel(){channel=sb.channel('room-'+roomId);channel.on('broadcast',{event:'speak'},(p)=>{if(p.payload.text)speakLocal(p.payload.text)});channel.on('broadcast',{event:'game'},(p)=>{const d=p.payload;if(d.type==='game_start'){clearInterval(lobbyTimer);loadPlayers().then(()=>{startGameScreen()})}});channel.subscribe()}

async function createRoom(){roomId=Math.floor(1000+Math.random()*9000).toString();document.getElementById('roomInput').value=roomId;const{error}=await sb.from('rooms').upsert({id:roomId,status:'waiting',host:null,created_at:new Date().toISOString()});if(error){alert('创建失败');return}alert('✅ 房间号：'+roomId)}

async function joinLobby(){myName=document.getElementById('nameInput').value.trim();roomId=document.getElementById('roomInput').value.trim();if(!myName)return alert('请输入名字');if(!roomId||roomId.length!==4||isNaN(roomId))return alert('请输入4位房间号');const{data:room}=await sb.from('rooms').select('*').eq('id',roomId).single();if(!room)return alert('❌ 房间不存在');const{data:existing}=await sb.from('players').select('*').eq('room_id',roomId);isHost=!existing||existing.length===0;if(isHost)await sb.from('rooms').update({host:myName}).eq('id',roomId);await sb.from('players').upsert({room_id:roomId,name:myName,alive:true,waiting_kill:null,items:'[]'},{onConflict:'room_id,name'});subscribeChannel();document.getElementById('loginScreen').style.display='none';document.getElementById('lobbyScreen').style.display='block';document.getElementById('lobbyRoomDisp').textContent=roomId;if(isHost)document.getElementById('btnStartGame').style.display='block';refreshLobby();lobbyTimer=setInterval(refreshLobby,2000)}

async function refreshLobby(){const{data}=await sb.from('players').select('*').eq('room_id',roomId);if(!data)return;document.getElementById('lobbyCount').textContent=data.length;document.getElementById('lobbyPlayerList').innerHTML=data.map(p=>`<span class="player-tag">${p.name}${p.name===myName?' 👑':''}</span>`).join(' ');const{data:room}=await sb.from('rooms').select('*').eq('id',roomId).single();if(room&&room.status==='playing'){clearInterval(lobbyTimer);await loadPlayers();startGameScreen()}}

async function startGame(){await sb.from('rooms').update({status:'playing'}).eq('id',roomId);clearInterval(lobbyTimer);await loadPlayers();startGameScreen();if(channel)channel.send({type:'broadcast',event:'game',payload:{type:'game_start'}})}

function startGameScreen(){document.getElementById('lobbyScreen').style.display='none';document.getElementById('gameScreen').style.display='block';document.getElementById('roomDisp').textContent=roomId;document.getElementById('myNameDisp').textContent=myName;myItems=[];gameLog=[];addLog('🎮 游戏开始！');speakAll('游戏开始！');getUserPos();spawnDropItem();startDropTimer();startPolling();renderAll()}

async function leaveLobby(){await sb.from('players').delete().eq('room_id',roomId).eq('name',myName);clearInterval(lobbyTimer);if(channel){channel.unsubscribe();channel=null}document.getElementById('lobbyScreen').style.display='none';document.getElementById('loginScreen').style.display='block';document.getElementById('btnStartGame').style.display='none'}

async function loadPlayers(){const{data}=await sb.from('players').select('*').eq('room_id',roomId);if(data)players=data.map(p=>({id:p.id,name:p.name,alive:p.alive,waitingKill:p.waiting_kill}));const me=players.find(p=>p.name===myName);if(me&&me.waitingKill&&!document.getElementById('confirmModal').classList.contains('show')){document.getElementById('confirmKiller').textContent=me.waitingKill;showModal('confirmModal');speakLocal('你被'+me.waitingKill+'撕了！')}}

function startPolling(){pollTimer=setInterval(async()=>{await loadPlayers();renderAll();checkEnd()},2000)}
function checkEnd(){const alv=players.filter(p=>p.alive&&!p.waitingKill);if(alv.length<=1&&players.filter(p=>p.waitingKill).length===0&&players.length>0){const winner=alv[0]?.name||'无人';addLog('🏆 游戏结束！获胜者：'+winner);speakAll('游戏结束！获胜者是'+winner);clearInterval(pollTimer);clearInterval(dropTimer);document.getElementById('winName').textContent=winner;document.getElementById('winOverlay').classList.add('show')}}

let killTarget='';
function clickP(name){if(name===myName)return;const me=players.find(p=>p.name===myName);if(!me||!me.alive)return;const p=players.find(p=>p.name===name);if(!p||!p.alive||p.waitingKill)return;killTarget=name;document.getElementById('killName').textContent=name;showModal('killModal')}

async function doKill(){if(!killTarget)return;await sb.from('players').update({waiting_kill:myName}).eq('room_id',roomId).eq('name',killTarget);addLog('⚡ '+myName+' 发起淘汰 '+killTarget);closeModal('killModal');killTarget='';await loadPlayers();renderAll()}

async function confirmKilled(){const me=players.find(p=>p.name===myName);if(!me||!me.waitingKill)return;const kn=me.waitingKill;me.alive=false;me.waitingKill=null;await sb.from('players').update({alive:false,waiting_kill:null}).eq('room_id',roomId).eq('name',myName);addLog('💀 '+kn+' 淘汰了 '+myName);speakAll(kn+'淘汰了'+myName);closeModal('confirmModal');document.querySelectorAll('.pcard').forEach(c=>{if(c.textContent.includes(myName))c.classList.add('shatter')});const rwd=itemPool[Math.floor(Math.random()*3)];myItems.push(rwd);addLog('🏆 奖励：'+rwd.name);await loadPlayers();renderAll();checkEnd()}

async function denyKill(){const me=players.find(p=>p.name===myName);if(!me||!me.waitingKill)return;me.waitingKill=null;await sb.from('players').update({waiting_kill:null}).eq('room_id',roomId).eq('name',myName);addLog('🤚 '+myName+' 否认被撕');closeModal('confirmModal');await loadPlayers();renderAll()}

function useItem(idx){const item=myItems[idx];if(item.type==='track'){const tg=players.filter(p=>p.alive&&!p.waitingKill&&p.name!==myName);if(!tg.length)return alert('无目标');document.getElementById('useTitle').textContent='📍 定位卡';document.getElementById('useBody').innerHTML=tg.map(p=>`<button class="btn btn-gold" onclick="doTrack('${p.name}',${idx})">📍 ${p.name}</button>`).join('');showModal('useModal')}else if(item.type==='revive'){const tg=players.filter(p=>!p.alive);if(!tg.length)return alert('无人可复活');document.getElementById('useTitle').textContent='🔄 复活卡';document.getElementById('useBody').innerHTML=tg.map(p=>`<button class="btn btn-green" onclick="doRevive('${p.name}',${idx})">🔄 ${p.name}</button>`).join('');showModal('useModal')}else if(item.type==='radar'){const alv=players.filter(p=>p.alive);document.getElementById('useTitle').textContent='🔮 雷达卡';document.getElementById('useBody').innerHTML='<p style="color:#00b894;font-weight:700">📡 存活：'+alv.map(p=>p.name).join('、')+'</p>';showModal('useModal');myItems.splice(idx,1);addLog('🔮 使用雷达卡');speakAll('雷达扫描完成');setTimeout(()=>{closeModal('useModal');renderAll()},2000)}}
async function doTrack(name,idx){addLog('📍 '+myName+' 定位 '+name);alert('📍 '+name+' 的位置已显示（5分钟）');myItems.splice(idx,1);closeModal('useModal');renderAll()}
async function doRevive(name,idx){await sb.from('players').update({alive:true,waiting_kill:null}).eq('room_id',roomId).eq('name',name);addLog('🔄 '+myName+' 复活了 '+name);speakAll(name+'复活了！');myItems.splice(idx,1);closeModal('useModal');await loadPlayers();renderAll()}

function renderAll(){
    const alv=players.filter(p=>p.alive&&!p.waitingKill),wait=players.filter(p=>p.waitingKill),ded=players.filter(p=>!p.alive);
    document.getElementById('aliveNum').textContent=alv.length;document.getElementById('waitNum').textContent=wait.length;document.getElementById('deadNum').textContent=ded.length;
    document.getElementById('aliveNames').textContent='🟢 '+(alv.length?alv.map(p=>p.name).join('、'):'无');
    document.getElementById('waitNames').textContent=wait.length?' | 🟠 '+wait.map(p=>p.name+'←'+p.waitingKill).join('、'):'';
    document.getElementById('deadNames').textContent=ded.length?' | 💀 '+ded.map(p=>p.name).join('、'):'';
    document.getElementById('playerList').innerHTML=players.map(p=>{let cls='live',tagCls='ptag-l',tagText='存活';if(!p.alive){cls='ded';tagCls='ptag-d';tagText='淘汰'}if(p.waitingKill){cls='wait';tagCls='ptag-w';tagText='待确认←'+p.waitingKill}return `<div class="pcard ${cls}" onclick="${p.alive&&!p.waitingKill&&p.name!==myName?"clickP('"+p.name+"')":''}"><span style="font-weight:800">${!p.alive?'💀':p.waitingKill?'🟠':'🟢'} ${p.name}${p.name===myName?' (你)':''}</span><span class="ptag ${tagCls}">${tagText}</span></div>`}).join('');
    document.getElementById('bagArea').innerHTML=myItems.length?myItems.map((it,i)=>`<button class="btn btn-gold" style="width:auto;display:inline-block;margin:3px;padding:10px 16px" onclick="useItem(${i})">${it.icon} ${it.name}</button>`).join(''):'<div class="empty">🎒 背包空空如也</div>';
    document.getElementById('logArea').innerHTML=gameLog.slice(-15).reverse().map(l=>`<div style="padding:2px 0;border-bottom:1px solid #eee"><span style="color:#ccc;font-size:10px">${l.time}</span> <span class="l${l.type}">${l.msg}</span></div>`).join('');
}
function addLog(msg){const type=msg.includes('💀')?'k':msg.includes('🎁')||msg.includes('🏆')||msg.includes('🔮')||msg.includes('📍')?'i':'r';gameLog.push({msg,time:new Date().toLocaleTimeString(),type});renderAll()}

document.getElementById('btnCreate').addEventListener('click',createRoom);
document.getElementById('btnJoin').addEventListener('click',joinLobby);
document.getElementById('btnStartGame').addEventListener('click',startGame);
document.getElementById('btnLeaveLobby').addEventListener('click',leaveLobby);
document.getElementById('btnKill').addEventListener('click',doKill);
document.getElementById('btnCancelKill').addEventListener('click',()=>closeModal('killModal'));
document.getElementById('btnConfirm').addEventListener('click',confirmKilled);
document.getElementById('btnDeny').addEventListener('click',denyKill);
document.getElementById('btnCancelUse').addEventListener('click',()=>closeModal('useModal'));
['Map','Players','Bag','Log'].forEach(n=>document.getElementById('tabBtn'+n).addEventListener('click',()=>switchTab(n.toLowerCase())));
setInterval(()=>{if(userPos&&currentDrop)checkDropDist()},3000);
</script>
</body>
