<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏃 撕名牌大作战</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(180deg,#fff7e6 0%,#fffbf0 40%,#e8f4fd 100%);color:#2d3436;min-height:100vh}
        .container{max-width:500px;margin:0 auto;padding:12px}
        .topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:linear-gradient(135deg,#ffd100,#ffb800);border-radius:16px;margin-bottom:10px;box-shadow:0 4px 16px rgba(255,184,0,.3)}
        .topbar h1{font-size:20px;color:#2d3436}
        .topbar .badge{background:#fff;color:#e17055;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:800}
        .stat-row{display:flex;gap:10px;margin:10px 0}
        .stat-box{flex:1;padding:14px 10px;border-radius:16px;text-align:center;font-weight:800;background:#fff;box-shadow:0 4px 16px rgba(0,0,0,.06)}
        .stat-alive{border:2.5px solid #00b894}.stat-alive .big{color:#00b894;font-size:28px}.stat-alive .sm{color:#00b894;font-size:11px}
        .stat-dead{border:2.5px solid #e17055}.stat-dead .big{color:#e17055;font-size:28px}.stat-dead .sm{color:#e17055;font-size:11px}
        .stat-wait{border:2.5px solid #f39c12}.stat-wait .big{color:#f39c12;font-size:28px}.stat-wait .sm{color:#f39c12;font-size:11px}
        .name-row{font-size:12px;line-height:1.8;margin:6px 0;background:#fff;border-radius:14px;padding:10px 14px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
        .name-row .alive-c{color:#00b894;font-weight:700}.name-row .dead-c{color:#e17055}.name-row .wait-c{color:#f39c12;font-weight:600}
        .tabs{display:flex;gap:6px;margin:10px 0 0}
        .tab-btn{flex:1;text-align:center;padding:14px 8px;font-size:14px;font-weight:800;cursor:pointer;border-radius:14px 14px 0 0;transition:all .25s;border:none}
        .tab-btn.active{background:#fff;color:#e17055;box-shadow:0 -4px 12px rgba(0,0,0,.06)}
        .tab-btn.inactive{background:#f0f0f0;color:#aaa}
        .page{background:#fff;border-radius:0 0 16px 16px;padding:14px;min-height:300px;box-shadow:0 6px 20px rgba(0,0,0,.05)}
        #mapContainer{width:100%;height:260px;border-radius:14px;overflow:hidden;border:2.5px solid #dfe6e9;position:relative}
        #amapContainer{width:100%;height:100%}
        .map-label{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.95);color:#2d3436;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;z-index:10;box-shadow:0 2px 10px rgba(0,0,0,.1);pointer-events:none}
        .drop-card{background:linear-gradient(135deg,#fffbf0,#fff7d6);border-radius:16px;padding:16px;text-align:center;border:3px solid #ffd100;margin:10px 0;display:none;box-shadow:0 6px 24px rgba(255,209,0,.3)}
        .drop-card.show{display:block}.drop-card .icon{font-size:44px}.drop-card .title{font-size:18px;font-weight:900;color:#e17055;margin:4px 0}.drop-card .dist{font-size:13px;color:#0984e3;font-weight:700}
        .timer-card{background:#fff;border-radius:14px;padding:12px;text-align:center;border:2.5px solid #ffeaa7;margin:10px 0;box-shadow:0 4px 14px rgba(255,234,167,.5)}
        .timer-card .time{font-size:34px;font-weight:900;color:#e17055;letter-spacing:2px}.timer-card .lbl{font-size:12px;color:#636e72;font-weight:600}
        .btn{padding:14px 22px;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;margin:3px}
        .btn:active{transform:scale(.94)}
        .btn-gold{background:linear-gradient(135deg,#ffd100,#ffb800);color:#2d3436;width:100%;box-shadow:0 6px 18px rgba(255,184,0,.35)}
        .btn-red{background:linear-gradient(135deg,#e17055,#d63031);color:#fff}
        .btn-green{background:linear-gradient(135deg,#00b894,#00a381);color:#fff;width:100%;box-shadow:0 6px 18px rgba(0,184,148,.35)}
        .btn-orange{background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff;width:100%;box-shadow:0 6px 18px rgba(243,156,18,.3)}
        .btn-gray{background:#888;color:#fff;width:100%}
        .btn-outline{background:#fff;border:2.5px solid #ffd100;color:#e17055;width:100%}
        .pcard{background:#fff;border-radius:14px;padding:16px;margin:8px 0;display:flex;justify-content:space-between;align-items:center;border-left:5px solid #dfe6e9;cursor:pointer;transition:all .25s;box-shadow:0 2px 8px rgba(0,0,0,.04)}
        .pcard:active{transform:scale(.97)}.pcard.live{border-left-color:#00b894;background:#f0faf6}
        .pcard.ded{border-left-color:#e17055;opacity:.5;background:#fff5f5}.pcard.wait{border-left-color:#f39c12;background:#fffdf0}
        .pcard .nm{font-size:16px;font-weight:800;color:#2d3436}
        .ptag{padding:6px 12px;border-radius:12px;font-size:12px;font-weight:800}
        .ptag-l{background:#00b894;color:#fff}.ptag-d{background:#e17055;color:#fff}.ptag-w{background:#f39c12;color:#fff;animation:pulse .8s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        .bag-chip{display:inline-block;background:linear-gradient(135deg,#ffd100,#ffb800);color:#2d3436;padding:12px 18px;border-radius:24px;margin:5px;font-weight:800;cursor:pointer;font-size:14px;box-shadow:0 4px 14px rgba(255,184,0,.3)}.bag-chip:active{transform:scale(.9)}
        .empty{color:#ccc;font-size:15px;text-align:center;padding:30px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:99999;justify-content:center;align-items:center}.modal.show{display:flex!important}
        .modal-box{background:#fff;border-radius:22px;padding:30px;max-width:360px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
        .modal-box h3{color:#e17055;font-size:20px;margin-bottom:12px;font-weight:900}.modal-box p{color:#636e72;font-size:15px;margin:8px 0}
        .log{background:#fff;border-radius:12px;padding:10px 12px;max-height:120px;overflow-y:auto;font-size:12px;line-height:1.8;margin-top:10px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
        .log .ll{border-bottom:1px solid #f5f5f5;padding:3px 0}.log .lt{color:#ccc}.log .lk{color:#e17055;font-weight:700}.log .li{color:#f39c12;font-weight:700}.log .ld{color:#0984e3;font-weight:700}.log .lr{color:#00b894;font-weight:700}
        .me{color:#e17055;font-size:12px;font-weight:800}
        .alert-toast{background:#e17055;color:#fff;padding:14px;border-radius:12px;text-align:center;font-weight:800;font-size:15px;margin:8px 0;display:none;box-shadow:0 6px 20px rgba(225,112,85,.4)}.alert-toast.show{display:block}
        input,select{width:100%;padding:16px;border-radius:14px;border:2.5px solid #e0e0e0;background:#fff;color:#2d3436;font-size:16px;margin:8px 0;transition:all .25s;font-weight:600}
        input:focus,select:focus{outline:none;border-color:#ffd100;box-shadow:0 0 0 4px rgba(255,209,0,.1)}
        .flash-red{animation:flashRed .6s}@keyframes flashRed{0%,100%{background:0 0}50%{background:rgba(225,112,85,.2)}}
        .flash-green{animation:flashGreen .6s}@keyframes flashGreen{0%,100%{background:0 0}50%{background:rgba(0,184,148,.2)}}
    </style>
</head>
<body>
<div class="container">
    <div id="loginScreen" style="padding-top:40px">
        <div style="text-align:center;margin-bottom:24px"><div style="font-size:64px">🏃</div><h2 style="color:#e17055;font-size:26px;font-weight:900">撕名牌大作战</h2></div>
        <input type="text" id="nameInput" placeholder="🎯 输入你的名字"><input type="text" id="roomInput" placeholder="🔢 房间号（4位数字）">
        <button class="btn btn-green" onclick="joinGame()">🎮 加入游戏</button><button class="btn btn-outline" onclick="createRoom()" style="margin-top:8px">🏠 创建新房间</button>
    </div>
    <div id="gameScreen" style="display:none">
        <div class="topbar"><h1>🏃 撕名牌</h1><span class="badge">🔑 <span id="roomDisp"></span></span></div>
        <div class="stat-row"><div class="stat-box stat-alive"><div class="big" id="aliveNum">0</div><div class="sm">🟢 存活</div></div><div class="stat-box stat-wait"><div class="big" id="waitNum">0</div><div class="sm">🟠 待确认</div></div><div class="stat-box stat-dead"><div class="big" id="deadNum">0</div><div class="sm">💀 淘汰</div></div></div>
        <div class="name-row"><span class="alive-c" id="aliveNames"></span><span class="wait-c" id="waitNames"></span><span class="dead-c" id="deadNames"></span></div>
        <div class="tabs"><div class="tab-btn active" id="tabMapBtn" onclick="switchTab('map')">🗺️ 地图</div><div class="tab-btn inactive" id="tabPlayersBtn" onclick="switchTab('players')">👥 玩家</div><div class="tab-btn inactive" id="tabBagBtn" onclick="switchTab('bag')">🎒 背包</div></div>
        <div class="page" id="pageMap"><div id="mapContainer"><div id="amapContainer"></div><div class="map-label">📍 <span id="rangeStatus" style="color:#00b894;font-weight:800">范围内</span></div></div><div class="timer-card"><div class="time" id="timerDisp">10:00</div><div class="lbl">⏰ 下次道具掉落</div></div><div class="drop-card" id="dropCard"><div class="icon" id="dropIcon"></div><div class="title" id="dropTitle"></div><div class="dist" id="dropDist"></div><button class="btn btn-gold" onclick="attemptPickup()">🎁 立即拾取！</button></div></div>
        <div class="page" id="pagePlayers" style="display:none"><div id="playerList"></div></div>
        <div class="page" id="pageBag" style="display:none"><div id="bagArea"></div></div>
        <div class="log" id="logArea"></div>
    </div>
</div>
<div class="modal" id="killModal"><div class="modal-box"><h3>⚠️ 确认撕掉</h3><p><strong id="killName" style="color:#e17055;font-size:18px"></strong></p><button class="btn btn-red" id="btnConfirmKill">✅ 确认撕掉！</button><button class="btn" onclick="closeModal('killModal')" style="background:#f0f0f0;color:#888;margin-top:6px">❌ 取消</button></div></div>
<div class="modal" id="confirmModal"><div class="modal-box"><h3>💀 你被撕了！</h3><p><strong id="confirmKiller" style="color:#e17055;font-size:18px"></strong> 撕掉了你的名牌！</p><button class="btn btn-orange" id="btnConfirmKilled">😵 确认淘汰</button><button class="btn btn-gray" id="btnDenyKill" style="margin-top:6px">🤚 否认</button></div></div>
<div class="modal" id="useModal"><div class="modal-box"><h3 id="useTitle"></h3><div id="useBody"></div><button class="btn" onclick="closeModal('useModal')" style="background:#f0f0f0;color:#888;margin-top:6px">取消</button></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://mswgibltwekuwkkllkrk.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zd2dpYmx0d2VrdXdra2xsa3JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzOTQwODUsImV4cCI6MjA5NTk3MDA4NX0.7eraxZGiQqVyIp6ow6R9DsfGPe5lTELcd-bRCL4gFj8';
const AMAP_KEY='12530b113a60115d9e162efd22d93558';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let myName='',roomId='',players=[],myItems=[],gameLog=[],currentDrop=null,dropSec=600,dropTimer=null,userPos=null;
const CENTER={lat:39.909,lng:116.397},RANGE_R=300;
const itemPool=[{name:'📍 定位卡',icon:'📍',type:'track'},{name:'🔄 复活卡',icon:'🔄',type:'revive'},{name:'🔮 雷达卡',icon:'🔮',type:'radar'}];
let amap=null,userMarker=null,dropMarker=null,rangeCircle=null,channel=null;

function showModal(id){document.getElementById(id).classList.add('show')}
function closeModal(id){document.getElementById(id).classList.remove('show')}

function initAMap(){if(typeof AMap==='undefined'){setTimeout(initAMap,500);return}amap=new AMap.Map('amapContainer',{zoom:16,center:[CENTER.lng,CENTER.lat]});rangeCircle=new AMap.Circle({center:[CENTER.lng,CENTER.lat],radius:RANGE_R,fillOpacity:0.06,strokeColor:'#00b894',strokeWeight:3,strokeDasharray:[8,5]});amap.add(rangeCircle);userMarker=new AMap.Marker({position:[CENTER.lng,CENTER.lat],content:'<div style="background:#0984e3;color:#fff;padding:4px 10px;border-radius:12px;font-size:12px">⚡ 我</div>',offset:new AMap.Pixel(-15,-15)});amap.add(userMarker)}
function loadAMapSDK(){if(typeof AMap!=='undefined'){initAMap();return}const s=document.createElement('script');s.src='https://webapi.amap.com/maps?v=2.0&key='+AMAP_KEY+'&callback=onAMapLoad';window.onAMapLoad=initAMap;document.head.appendChild(s)}
loadAMapSDK();

function speak(text,everyone){if('speechSynthesis' in window){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='zh-CN';u.rate=1.35;u.pitch=1.4;speechSynthesis.speak(u)}if(everyone&&channel){channel.send({type:'broadcast',event:'game_update',payload:{type:'speak',text:text,user:myName}})}}
function switchTab(tab){document.getElementById('tabMapBtn').className=tab==='map'?'tab-btn active':'tab-btn inactive';document.getElementById('tabPlayersBtn').className=tab==='players'?'tab-btn active':'tab-btn inactive';document.getElementById('tabBagBtn').className=tab==='bag'?'tab-btn active':'tab-btn inactive';document.getElementById('pageMap').style.display=tab==='map'?'block':'none';document.getElementById('pagePlayers').style.display=tab==='players'?'block':'none';document.getElementById('pageBag').style.display=tab==='bag'?'block':'none'}

function subscribeRealtime(){
    channel=sb.channel('room-'+roomId);
    channel.on('broadcast',{event:'game_update'},(payload)=>{
        const d=payload.payload;
        if(d.type==='kill_request'&&d.target===myName){
            document.getElementById('confirmKiller').textContent=d.killer;
            showModal('confirmModal');speak('你被'+d.killer+'撕了！');
        }
        if(d.type==='kill_confirmed'){
            const p=players.find(p=>p.name===d.target);if(p){p.alive=false;p.waitingKill=null}
            addLog('kill','💀 '+d.killer+' 淘汰了 '+d.target);speak(d.killer+'淘汰了'+d.target,true);
            document.body.classList.add('flash-red');setTimeout(()=>document.body.classList.remove('flash-red'),600);
            renderAll();checkEnd();
        }
        if(d.type==='kill_denied'){
            const p=players.find(p=>p.name===d.target);if(p)p.waitingKill=null;
            addLog('sys','🤚 '+d.target+' 否认被撕');closeModal('confirmModal');renderAll();
        }
        if(d.type==='revive'){const p=players.find(p=>p.name===d.target);if(p){p.alive=true;p.waitingKill=null}addLog('revive','🔄 '+d.user+' 复活了 '+d.target);speak(d.target+'复活了！',true);renderAll()}
        if(d.type==='drop'){currentDrop={name:d.item.name,icon:d.item.icon,type:d.item.type,lat:d.lat,lng:d.lng};document.getElementById('dropIcon').textContent=d.item.icon;document.getElementById('dropTitle').textContent=d.item.name;document.getElementById('dropCard').classList.remove('show');addLog('drop','🎁 '+d.item.name+' 已掉落');speak('有道具已刷新',true);renderAll()}
        if(d.type==='track'){addLog('item','📍 '+d.user+' 使用了定位卡');speak(d.user+'使用了定位卡',true);renderAll()}
        if(d.type==='pickup'){currentDrop=null;document.getElementById('dropCard').classList.remove('show');addLog('item','🎁 '+d.user+' 拾取了道具');renderAll()}
        if(d.type==='speak'&&d.text&&d.user!==myName)speak(d.text,false);
    }).subscribe();
}
function broadcast(data){if(channel)channel.send({type:'broadcast',event:'game_update',payload:{...data,user:myName}})}

async function createRoom(){roomId=Math.floor(1000+Math.random()*9000).toString();document.getElementById('roomInput').value=roomId;await sb.from('rooms').upsert({id:roomId,status:'waiting',created_at:new Date().toISOString()});alert('✅ 房间号：'+roomId)}
async function joinGame(){
    myName=document.getElementById('nameInput').value.trim();roomId=document.getElementById('roomInput').value.trim();
    if(!myName)return alert('请输入名字');if(!roomId||roomId.length!==4||isNaN(roomId))return alert('请输入4位房间号');
    const{data:room}=await sb.from('rooms').select('*').eq('id',roomId).single();
    if(!room)return alert('❌ 房间不存在');
    await sb.from('players').upsert({room_id:roomId,name:myName,alive:true,waiting_kill:null,items:'[]'},{onConflict:'room_id,name'});
    const{data:db}=await sb.from('players').select('*').eq('room_id',roomId);
    players=db.map(p=>({id:p.id,name:p.name,alive:p.alive,waitingKill:p.waiting_kill}));
    myItems=[];gameLog=[];currentDrop=null;
    document.getElementById('loginScreen').style.display='none';document.getElementById('gameScreen').style.display='block';
    document.getElementById('roomDisp').textContent=roomId;
    subscribeRealtime();getUserPos();startTimer();renderAll();switchTab('map');
    addLog('sys','🎮 游戏开始！共 '+players.length+' 人');speak('游戏开始！');
}

function getUserPos(){if(navigator.geolocation){navigator.geolocation.watchPosition(pos=>{userPos={lat:pos.coords.latitude,lng:pos.coords.longitude}},()=>{}, {enableHighAccuracy:true})}}
function dist(a,b){const R=6371000;const dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180;const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)))}

function startTimer(){dropSec=600;updateTimer();dropTimer=setInterval(()=>{dropSec--;updateTimer();if(dropSec<=0){spawnDrop();dropSec=600}},1000)}
function updateTimer(){const m=Math.floor(dropSec/60),s=dropSec%60;document.getElementById('timerDisp').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}
async function spawnDrop(){const item=itemPool[Math.floor(Math.random()*itemPool.length)],rlat=CENTER.lat+(Math.random()-.5)*0.003,rlng=CENTER.lng+(Math.random()-.5)*0.003;currentDrop={...item,lat:rlat,lng:rlng};document.getElementById('dropIcon').textContent=item.icon;document.getElementById('dropTitle').textContent=item.name;addLog('drop','🎁 '+item.name+' 已掉落');speak('有道具已刷新',true);broadcast({type:'drop',item:item,lat:rlat,lng:rlng});renderAll()}
async function attemptPickup(){if(!currentDrop)return;myItems.push({name:currentDrop.name,icon:currentDrop.icon,type:currentDrop.type});addLog('item','🎁 '+myName+' 拾取了 '+currentDrop.name);speak('获得'+currentDrop.name);currentDrop=null;document.getElementById('dropCard').classList.remove('show');broadcast({type:'pickup'});renderAll()}

let killTarget='';
function clickP(name){killTarget=name;document.getElementById('killName').textContent=name;showModal('killModal')}
async function doKill(){
    const p=players.find(p=>p.name===killTarget);if(!p)return;
    p.waitingKill=myName;await sb.from('players').update({waiting_kill:myName}).eq('room_id',roomId).eq('name',killTarget);
    addLog('sys','⚡ '+myName+' 发起淘汰 '+killTarget);closeModal('killModal');
    broadcast({type:'kill_request',target:killTarget,killer:myName});renderAll();
}
async function confirmKilled(){
    const me=players.find(p=>p.name===myName);if(!me||!me.waitingKill)return;
    const killerName=me.waitingKill;me.alive=false;me.waitingKill=null;
    await sb.from('players').update({alive:false,waiting_kill:null}).eq('room_id',roomId).eq('name',myName);
    addLog('kill','💀 '+killerName+' 淘汰了 '+myName);speak(killerName+'淘汰了'+myName,true);
    broadcast({type:'kill_confirmed',target:myName,killer:killerName});
    const rwd=itemPool[Math.floor(Math.random()*itemPool.length)];myItems.push({name:rwd.name,icon:rwd.icon,type:rwd.type});
    addLog('item','🏆 奖励：'+rwd.name);closeModal('confirmModal');renderAll();checkEnd();
}
async function denyKill(){
    const me=players.find(p=>p.name===myName);if(!me||!me.waitingKill)return;
    me.waitingKill=null;await sb.from('players').update({waiting_kill:null}).eq('room_id',roomId).eq('name',myName);
    addLog('sys','🤚 '+myName+' 否认被撕');closeModal('confirmModal');
    broadcast({type:'kill_denied',target:myName});renderAll();
}
function checkEnd(){const alv=players.filter(p=>p.alive&&!p.waitingKill);if(alv.length<=1){addLog('sys','🏆 游戏结束！');speak('游戏结束',true);clearInterval(dropTimer)}}

function useItem(idx){const item=myItems[idx];if(item.type==='track'){const tg=players.filter(p=>p.alive&&p.name!==myName);if(!tg.length)return alert('无目标');document.getElementById('useTitle').textContent='📍 定位卡（5分钟）';document.getElementById('useBody').innerHTML=tg.map(p=>`<button class="btn btn-gold" onclick="doTrack('${p.name}',${idx})">📍 ${p.name}</button>`).join('');showModal('useModal')}else if(item.type==='revive'){const tg=players.filter(p=>!p.alive);if(!tg.length)return alert('无人可复活');document.getElementById('useTitle').textContent='🔄 复活卡';document.getElementById('useBody').innerHTML=tg.map(p=>`<button class="btn btn-green" onclick="doRevive('${p.name}',${idx})">🔄 ${p.name}</button>`).join('');showModal('useModal')}else if(item.type==='radar'){const alv=players.filter(p=>p.alive);document.getElementById('useTitle').textContent='🔮 雷达卡（1分钟）';document.getElementById('useBody').innerHTML='<p style="color:#00b894;font-weight:700">📡 存活：'+alv.map(p=>p.name).join('、')+'</p>';showModal('useModal');myItems.splice(idx,1);addLog('item','🔮 '+myName+' 使用雷达卡');speak('雷达扫描完成');setTimeout(()=>{closeModal('useModal');renderAll()},1500)}}
async function doTrack(name,idx){addLog('item','📍 '+myName+' 定位 '+name);alert('📍 '+name+' 的位置已显示（5分钟）');speak('定位成功',true);broadcast({type:'track'});myItems.splice(idx,1);closeModal('useModal');renderAll()}
async function doRevive(name,idx){const p=players.find(p=>p.name===name);if(p){p.alive=true;p.waitingKill=null}await sb.from('players').update({alive:true,waiting_kill:null}).eq('room_id',roomId).eq('name',name);addLog('revive','🔄 '+myName+' 复活了 '+name);speak(name+'复活了！',true);broadcast({type:'revive',target:name});myItems.splice(idx,1);closeModal('useModal');renderAll()}

function renderAll(){
    const alv=players.filter(p=>p.alive&&!p.waitingKill),wait=players.filter(p=>p.waitingKill),ded=players.filter(p=>!p.alive);
    document.getElementById('aliveNum').textContent=alv.length;document.getElementById('waitNum').textContent=wait.length;document.getElementById('deadNum').textContent=ded.length;
    document.getElementById('aliveNames').textContent='🟢 '+(alv.length?alv.map(p=>p.name).join('、'):'无');
    document.getElementById('waitNames').textContent=wait.length?'  |  🟠 '+wait.map(p=>p.name+'←'+p.waitingKill).join('、'):'';
    document.getElementById('deadNames').textContent=ded.length?'  |  💀 '+ded.map(p=>p.name).join('、'):'';
    document.getElementById('playerList').innerHTML=players.map(p=>{let cls='live',tagCls='ptag-l',tagText='存活';if(!p.alive){cls='ded';tagCls='ptag-d';tagText='淘汰'}if(p.waitingKill){cls='wait';tagCls='ptag-w';tagText='待确认←'+p.waitingKill}return `<div class="pcard ${cls}" onclick="${p.alive&&!p.waitingKill&&p.name!==myName?"clickP('"+p.name+"')":''}"><span class="nm">${!p.alive?'💀':p.waitingKill?'🟠':'🟢'} ${p.name}${p.name===myName?' <span class="me">(你)</span>':''}</span><span class="ptag ${tagCls}">${tagText}</span></div>`}).join('');
    document.getElementById('bagArea').innerHTML=myItems.length?myItems.map((it,i)=>`<span class="bag-chip" onclick="useItem(${i})">${it.icon} ${it.name}</span>`).join(' '):'<div class="empty">🎒 背包空空如也</div>';
    document.getElementById('logArea').innerHTML=gameLog.slice(-10).reverse().map(l=>`<div class="ll"><span class="lt">${l.time}</span> <span class="l${l.type==='kill'?'k':l.type==='item'?'i':l.type==='drop'?'d':l.type==='revive'?'r':'i'}">${l.msg}</span></div>`).join('');
}
function addLog(type,msg){gameLog.push({type,msg,time:new Date().toLocaleTimeString()});renderAll()}

document.getElementById('btnConfirmKill').addEventListener('click',doKill);
document.getElementById('btnConfirmKilled').addEventListener('click',confirmKilled);
document.getElementById('btnDenyKill').addEventListener('click',denyKill);

setInterval(()=>{const me=players.find(p=>p.name===myName);if(me&&me.waitingKill&&!document.getElementById('confirmModal').classList.contains('show')){document.getElementById('confirmKiller').textContent=me.waitingKill;showModal('confirmModal');speak('你被'+me.waitingKill+'撕了！')}},3000);
</script>
</body>
</html>
