<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>撕名牌-修复版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h2{color:#ffd100;margin:12px 0}
.btn{padding:12px 24px;border-radius:10px;font-weight:800;cursor:pointer;border:none;margin:6px;font-size:15px}
.btn-gold{background:#ffd100;color:#333}.btn-green{background:#00b894;color:#fff}
input{padding:12px;border-radius:8px;border:1px solid #555;background:#222;color:#fff;margin:6px;font-size:15px}
.tag{display:inline-block;background:#ffd100;color:#333;padding:6px 14px;border-radius:14px;margin:3px;font-weight:700}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:999;justify-content:center;align-items:center}
.modal.show{display:flex}
.modal-box{background:#1a1a2e;border-radius:18px;padding:24px;max-width:350px;width:90%;text-align:center;border:2px solid #ffd100}
</style></head>
<body>
<h2>🏃 撕名牌 - 极简测试版</h2>
<div id="loginArea">
    <input type="text" id="usernameInput" placeholder="用户名"><input type="password" id="passwordInput" placeholder="密码">
    <button class="btn btn-gold" onclick="register()">注册</button><button class="btn btn-green" onclick="login()">登录</button>
</div>
<div id="lobbyArea" style="display:none">
    <p>👤 <span id="myNameDisp" style="color:#ffd100"></span> | 房间：<span id="roomDisp" style="color:#ffd100"></span></p>
    <button class="btn btn-gold" onclick="createRoom()">创建房间</button>
    <input type="text" id="joinInput" placeholder="房间号"><button class="btn btn-green" onclick="joinRoom()">加入</button>
    <p style="margin-top:10px">玩家列表：<span id="count">0</span>人</p>
    <div id="playerTags"></div>
    <button class="btn btn-green" id="startBtn" style="display:none" onclick="startGame()">开始游戏</button>
</div>
<div id="gameArea" style="display:none;width:100%;max-width:400px">
    <p>🎮 游戏进行中 | 存活：<span id="aliveCount">0</span></p>
    <div id="playerList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb=window.supabase.createClient('https://mswgibltwekuwkkllkrk.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zd2dpYmx0d2VrdXdra2xsa3JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzOTQwODUsImV4cCI6MjA5NTk3MDA4NX0.7eraxZGiQqVyIp6ow6R9DsfGPe5lTELcd-bRCL4gFj8');
let myName='',roomId='',isHost=false,timer=null;

async function register(){
    const u=document.getElementById('usernameInput').value.trim(),p=document.getElementById('passwordInput').value.trim();
    if(!u||!p)return alert('请输入用户名和密码');
    const{data:exist}=await sb.from('users').select('*').eq('username',u).single();
    if(exist)return alert('用户名已存在');
    await sb.from('users').insert({username:u,password:p});alert('注册成功！请登录');
}
async function login(){
    const u=document.getElementById('usernameInput').value.trim(),p=document.getElementById('passwordInput').value.trim();
    const{data:user}=await sb.from('users').select('*').eq('username',u).eq('password',p).single();
    if(!user)return alert('用户名或密码错误');
    myName=u;document.getElementById('loginArea').style.display='none';document.getElementById('lobbyArea').style.display='block';document.getElementById('myNameDisp').textContent=u;
}
async function createRoom(){
    roomId=Math.floor(1000+Math.random()*9000).toString();isHost=true;
    document.getElementById('roomDisp').textContent=roomId;document.getElementById('startBtn').style.display='block';
    await sb.from('rooms').upsert({id:roomId,status:'waiting'});
    await sb.from('players').upsert({room_id:roomId,name:myName,alive:true,hearts:1},{onConflict:'room_id,name'});
    refreshLobby();timer=setInterval(refreshLobby,2000);
}
async function joinRoom(){
    roomId=document.getElementById('joinInput').value.trim();isHost=false;
    if(!roomId)return;
    const{data:room}=await sb.from('rooms').select('*').eq('id',roomId).single();
    if(!room)return alert('房间不存在');
    document.getElementById('roomDisp').textContent=roomId;
    await sb.from('players').upsert({room_id:roomId,name:myName,alive:true,hearts:1},{onConflict:'room_id,name'});
    refreshLobby();timer=setInterval(refreshLobby,2000);
}
async function refreshLobby(){
    const{data}=await sb.from('players').select('*').eq('room_id',roomId);
    document.getElementById('count').textContent=data?data.length:0;
    document.getElementById('playerTags').innerHTML=data?data.map(p=>`<span class="tag">${p.name}${p.name===myName&&isHost?' 👑':''}</span>`).join(' '):'';
    const{data:room}=await sb.from('rooms').select('*').eq('id',roomId).single();
    if(room&&room.status==='playing'){clearInterval(timer);startGameScreen()}
}
async function startGame(){
    await sb.from('rooms').update({status:'playing'}).eq('id',roomId);
    clearInterval(timer);startGameScreen();
}
function startGameScreen(){
    document.getElementById('lobbyArea').style.display='none';document.getElementById('gameArea').style.display='block';
    setInterval(async()=>{
        const{data}=await sb.from('players').select('*').eq('room_id',roomId);
        const alv=data?data.filter(p=>p.alive):[];
        document.getElementById('aliveCount').textContent=alv.length;
        document.getElementById('playerList').innerHTML=alv.map(p=>`<div style="padding:8px;margin:3px;background:#222;border-radius:8px;border-left:4px solid #00b894">🟢 ${p.name} ❤️${p.hearts||1}</div>`).join('');
    },2000);
}
</script>
</body>
</html>
